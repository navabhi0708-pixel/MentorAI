<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentorAI - Signup</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(34,197,94,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -200px;
            left: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px 36px;
            width: 400px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            animation: fadeUp 0.4s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .auth-logo img {
            height: 44px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255,215,0,0.4);
        }

        .auth-logo span {
            font-size: 24px;
            font-weight: 700;
        }

        .auth-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
            text-align: center;
        }

        .auth-subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            text-align: center;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 7px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-family: 'Space Grotesk', sans-serif;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: rgba(34,197,94,0.6);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 3px rgba(34,197,94,0.1);
        }

        .form-group input::placeholder { color: rgba(255,255,255,0.25); }

        .password-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrap input {
            width: 100%;
            padding-right: 44px;
        }

        .eye-btn {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            opacity: 0.5;
            transition: opacity 0.2s;
            padding: 0;
        }

        .eye-btn:hover { opacity: 1; }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #22c55e, #4ade80);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .auth-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(34,197,94,0.4);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            color: #fca5a5;
            margin-bottom: 14px;
            display: none;
            text-align: center;
        }

        .success-msg {
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            color: #86efac;
            margin-bottom: 14px;
            display: none;
            text-align: center;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
        }

        .auth-footer a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover { color: #93c5fd; }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 18px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }

        .divider span {
            font-size: 11px;
            color: rgba(255,255,255,0.25);
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="auth-logo">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="MentorAI">
        <span>MentorAI</span>
    </div>

    <h2 class="auth-title">Join MentorAI 🚀</h2>

    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Choose a unique username">
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">
    </div>

    <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
            <input type="password" id="password" placeholder="At least 6 characters" onkeydown="if(event.key==='Enter') signupUser()">
            <button class="eye-btn" type="button" onclick="togglePassword('password', this)">👁️</button>
        </div>
    </div>

    <button class="auth-btn" onclick="signupUser()" id="signup-btn">Create Account →</button>

    <div class="divider"><span>or</span></div>

    <div class="auth-footer">
        Already have an account? <a href="/login">Login here</a>
    </div>
</div>

<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
    } else {
        input.type = 'password';
        btn.textContent = '👁️';
    }
}

async function signupUser() {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const btn = document.getElementById('signup-btn');

    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';

    if (!username || !email || !password) {
        errorMsg.textContent = 'Please fill all fields!';
        errorMsg.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
        const res = await fetch('/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();

        if (data.success) {
            successMsg.textContent = 'OTP sent to your email! Redirecting... ✓';
            successMsg.style.display = 'block';
            btn.textContent = 'Done! ✓';
            btn.style.background = 'linear-gradient(135deg, #3b82f6, #06b6d4)';
            setTimeout(() => window.location.href = '/verify-otp', 1500);
        } else {
            errorMsg.textContent = data.message;
            errorMsg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Create Account →';
        }
    } catch (e) {
        errorMsg.textContent = 'Something went wrong, please try again!';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account →';
    }
}
</script>
</body>
</html>
